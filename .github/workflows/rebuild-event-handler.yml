name: Rebuild Event Handlers

on:
  push:
    branches: [main]
    paths-ignore:
      - 'logs/**'
      - 'docs/**'
      - 'templates/docker/**'
      - 'templates/config/**'
      - 'docker/job/**'
      - '*.md'
  workflow_dispatch:

concurrency:
  group: event-handler-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: [self-hosted, clawforge]
    timeout-minutes: 20
    steps:
      - name: Checkout latest code
        uses: actions/checkout@v4

      - name: Resolve compose project
        id: setup
        run: |
          # Known deployment directory (where docker-compose was originally run)
          DEPLOY_DIR="$HOME/ClaudeCode/Business/Products/clawforge"

          # Get project name from running containers
          PROJECT_NAME=$(docker inspect clawforge-noah --format '{{index .Config.Labels "com.docker.compose.project"}}' 2>/dev/null || echo "clawforge")
          PROJECT_DIR=$(docker inspect clawforge-noah --format '{{index .Config.Labels "com.docker.compose.project.working_dir"}}' 2>/dev/null || echo "")

          # Validate .env exists at the label's path; fallback to known deploy dir
          if [ -n "$PROJECT_DIR" ] && [ -f "$PROJECT_DIR/.env" ]; then
            echo "Using label path: $PROJECT_DIR"
          elif [ -f "$DEPLOY_DIR/.env" ]; then
            echo "Label path missing .env, falling back to: $DEPLOY_DIR"
            PROJECT_DIR="$DEPLOY_DIR"
          else
            echo "No .env found at label path ($PROJECT_DIR) or deploy dir ($DEPLOY_DIR)"
            exit 1
          fi

          echo "name=$PROJECT_NAME" >> "$GITHUB_OUTPUT"
          echo "dir=$PROJECT_DIR" >> "$GITHUB_OUTPUT"
          echo "Project: $PROJECT_NAME at $PROJECT_DIR"

      - name: Rebuild and restart containers
        run: |
          # Build from checkout (latest code), but use original project's
          # .env and project name so containers replace existing ones.
          # CACHE_BUST env var is read by docker-compose.yml build.args
          # to invalidate Docker layer cache for source COPY layers.
          export CACHE_BUST="${GITHUB_SHA:-$(date +%s)}"
          docker compose \
            -p "${{ steps.setup.outputs.name }}" \
            --env-file "${{ steps.setup.outputs.dir }}/.env" \
            up -d --build noah-event-handler ses-event-handler

      - name: Sync config into volumes
        run: |
          # Named config volumes shadow the image's /app/config/ —
          # copy updated config files so volumes get latest content.
          # Instance-specific configs (SOUL.md, EVENT_HANDLER.md, AGENT.md)
          # are especially important since they define agent identity.

          # Shared config files
          for CONTAINER in clawforge-noah clawforge-ses; do
            for FILE in JOB_SUMMARY.md FEATURES.json; do
              if [ -f "config/$FILE" ]; then
                docker cp "config/$FILE" "${CONTAINER}:/app/config/${FILE}"
                echo "Copied config/$FILE -> $CONTAINER"
              fi
            done
          done

          # Instance-specific config files
          for FILE in SOUL.md EVENT_HANDLER.md AGENT.md REPOS.json; do
            if [ -f "instances/noah/config/$FILE" ]; then
              docker cp "instances/noah/config/$FILE" "clawforge-noah:/app/config/${FILE}"
              echo "Copied noah/$FILE -> clawforge-noah"
            fi
            if [ -f "instances/strategyES/config/$FILE" ]; then
              docker cp "instances/strategyES/config/$FILE" "clawforge-ses:/app/config/${FILE}"
              echo "Copied strategyES/$FILE -> clawforge-ses"
            fi
          done

      - name: Health check
        run: |
          echo "Waiting for containers to stabilize..."
          sleep 15
          FAILED=0
          set +e
          for CONTAINER in clawforge-noah clawforge-ses; do
            # Docker health status check
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' "$CONTAINER" 2>/dev/null || echo "unknown")
            echo "${CONTAINER} docker status: ${STATUS}"
            if [ "$STATUS" != "healthy" ]; then
              echo "${CONTAINER}: docker health check FAILED (status: ${STATUS})"
              FAILED=1
            fi

            # HTTP health check inside container
            HTTP_STATUS=$(docker exec "$CONTAINER" curl -sf http://localhost:80/api/ping 2>/dev/null; echo $?)
            if [ "$HTTP_STATUS" -eq 0 ]; then
              echo "${CONTAINER}: HTTP health check PASSED"
            else
              echo "${CONTAINER}: HTTP health check FAILED (curl exit: ${HTTP_STATUS})"
              FAILED=1
            fi
          done
          set -e

          if [ "$FAILED" -eq 1 ]; then
            echo "Not all containers are healthy after rebuild."

            # Load .env to get Slack credentials
            ENV_FILE="${{ steps.setup.outputs.dir }}/.env"
            if [ -f "$ENV_FILE" ]; then
              set -o allexport
              # shellcheck disable=SC1090
              source "$ENV_FILE"
              set +o allexport
            fi

            if [ -n "$SLACK_BOT_TOKEN" ] && [ -n "$SLACK_OPERATOR_CHANNEL" ]; then
              curl -s -X POST https://slack.com/api/chat.postMessage \
                -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
                -H "Content-Type: application/json" \
                --data "{\"channel\":\"$SLACK_OPERATOR_CHANNEL\",\"text\":\"Deploy alert: Not all ClawForge containers are healthy after rebuild. Check VPS.\"}"
              echo "Slack notification sent to $SLACK_OPERATOR_CHANNEL"
            else
              echo "Warning: SLACK_BOT_TOKEN or SLACK_OPERATOR_CHANNEL not set — skipping Slack notification"
            fi

            exit 1
          fi
