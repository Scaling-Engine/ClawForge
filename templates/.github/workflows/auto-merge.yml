name: Auto-Merge ClawForge PR

on:
  pull_request:
    types: [opened]
    branches: [main]

jobs:
  auto-merge:
    runs-on: ${{ vars.RUNS_ON || 'ubuntu-latest' }}
    if: startsWith(github.event.pull_request.head.ref, 'job/')
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Wait for merge check
        id: merge-check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          for i in $(seq 1 30); do
            sleep 10
            MERGEABLE=$(gh pr view "$PR_NUMBER" --repo "${{ github.repository }}" --json mergeable -q '.mergeable')
            if [ "$MERGEABLE" != "" ] && [ "$MERGEABLE" != "UNKNOWN" ]; then
              echo "mergeable=$MERGEABLE" >> "$GITHUB_OUTPUT"
              echo "Mergeable: $MERGEABLE"
              exit 0
            fi
            echo "Still computing... (attempt $i/30)"
          done
          echo "mergeable=UNKNOWN" >> "$GITHUB_OUTPUT"
          echo "Timed out waiting for merge check"

      - name: Check AUTO_MERGE setting
        if: steps.merge-check.outputs.mergeable == 'MERGEABLE'
        id: check-setting
        run: |
          AUTO_MERGE="${{ vars.AUTO_MERGE }}"
          if [ "$AUTO_MERGE" = "false" ]; then
            echo "Auto-merge disabled via AUTO_MERGE=false"
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          else
            echo "Auto-merge enabled"
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check for blocked paths (instance scaffolding)
        if: steps.merge-check.outputs.mergeable == 'MERGEABLE' && steps.check-setting.outputs.enabled == 'true'
        id: check-blocked
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          BLOCKED=false

          CHANGED_FILES=$(gh pr diff "$PR_NUMBER" --name-only --repo "${{ github.repository }}")
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            if [[ "$file" == instances/* ]] || [[ "$file" == "docker-compose.yml" ]]; then
              echo "BLOCKED (instance scaffolding): $file"
              BLOCKED=true
            fi
          done <<< "$CHANGED_FILES"

          echo "blocked=$BLOCKED" >> "$GITHUB_OUTPUT"

      - name: Check ALLOWED_PATHS
        if: steps.merge-check.outputs.mergeable == 'MERGEABLE' && steps.check-setting.outputs.enabled == 'true' && steps.check-blocked.outputs.blocked != 'true'
        id: check-paths
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ALLOWED_PATHS="${{ vars.ALLOWED_PATHS }}"
          PR_NUMBER="${{ github.event.pull_request.number }}"

          # Default: only logs allowed
          if [ -z "$ALLOWED_PATHS" ]; then
            ALLOWED_PATHS="/logs"
          fi

          # Normalize: ensure each prefix starts with /
          IFS=',' read -ra RAW_PREFIXES <<< "$ALLOWED_PATHS"
          PREFIXES=()
          for p in "${RAW_PREFIXES[@]}"; do
            trimmed=$(echo "$p" | xargs)
            [ -z "$trimmed" ] && continue
            # Ensure leading /
            [[ "$trimmed" != /* ]] && trimmed="/$trimmed"
            PREFIXES+=("$trimmed")
          done

          # "/" means everything allowed
          for p in "${PREFIXES[@]}"; do
            if [ "$p" = "/" ]; then
              echo "All paths allowed (ALLOWED_PATHS contains /)"
              echo "allowed=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done

          # Get changed files
          CHANGED_FILES=$(gh pr diff "$PR_NUMBER" --name-only --repo "${{ github.repository }}")
          if [ -z "$CHANGED_FILES" ]; then
            echo "No changed files"
            echo "allowed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Check each file against prefixes
          # Strip leading / from prefixes for comparison (git paths are relative)
          ALL_OK=true
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            FILE_OK=false
            for prefix in "${PREFIXES[@]}"; do
              compare="${prefix#/}"
              if [[ "$file" == "$compare"* ]]; then
                FILE_OK=true
                break
              fi
            done
            if [ "$FILE_OK" = "false" ]; then
              echo "BLOCKED: $file"
              ALL_OK=false
            fi
          done <<< "$CHANGED_FILES"

          echo "allowed=$ALL_OK" >> "$GITHUB_OUTPUT"

      - name: Check merge policy
        if: steps.merge-check.outputs.mergeable == 'MERGEABLE' && steps.check-setting.outputs.enabled == 'true' && steps.check-blocked.outputs.blocked != 'true' && steps.check-paths.outputs.allowed == 'true'
        id: check-merge-policy
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH="${{ github.event.pull_request.head.ref }}"
          JOB_ID="${BRANCH#job/}"

          # Read merge policy from REPOS.json committed in the repo
          # Default to 'auto' if file missing or field absent
          POLICY="auto"
          if [ -f "instances/noah/config/REPOS.json" ]; then
            # Extract mergePolicy for any repo — since we don't know which repo
            # this job targeted from the PR alone, check all entries.
            # Jobs only target one repo at a time, so there's one matching entry.
            # For simplicity, read the first non-auto policy that matches.
            POLICY=$(JOB_ID="$JOB_ID" node -e "
              try {
                const fs = require('fs');
                const data = JSON.parse(fs.readFileSync('instances/noah/config/REPOS.json', 'utf8'));
                // Check if gate-failures.md exists on this branch
                const hasGateFailures = fs.existsSync('logs/' + process.env.JOB_ID + '/gate-failures.md');
                // Find the repo's merge policy — use the most restrictive if multiple
                const policies = (data.repos || []).map(r => r.mergePolicy || 'auto');
                // For now, use the repo-level default from the first repo with a policy set
                // In practice, jobs target one repo so config is per-instance
                const policy = policies.find(p => p !== 'auto') || 'auto';
                console.log(policy);
              } catch (e) {
                console.log('auto');
              }
            " 2>/dev/null || echo "auto")
          fi

          echo "Merge policy: $POLICY"

          if [ "$POLICY" = "manual" ]; then
            echo "Merge policy is 'manual' — blocking auto-merge"
            echo "allowed=false" >> "$GITHUB_OUTPUT"
          elif [ "$POLICY" = "gate-required" ]; then
            # Check if gate-failures.md exists on this branch
            if [ -f "logs/${JOB_ID}/gate-failures.md" ]; then
              echo "Merge policy is 'gate-required' and gate-failures.md found — blocking auto-merge"
              echo "allowed=false" >> "$GITHUB_OUTPUT"
            else
              echo "Merge policy is 'gate-required' and no gate failures — allowing auto-merge"
              echo "allowed=true" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "Merge policy is 'auto' — allowing auto-merge"
            echo "allowed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Merge PR
        if: steps.merge-check.outputs.mergeable == 'MERGEABLE' && steps.check-setting.outputs.enabled == 'true' && steps.check-blocked.outputs.blocked != 'true' && steps.check-paths.outputs.allowed == 'true' && steps.check-merge-policy.outputs.allowed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr merge ${{ github.event.pull_request.number }} --squash --repo "${{ github.repository }}"
